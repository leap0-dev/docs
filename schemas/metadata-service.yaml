openapi: 3.1.0
info:
  title: Leap0 Metadata Service API
  description: In-guest IMDSv2 metadata service for Leap0 sandbox metadata.
  version: 1.0.0

servers:
  - url: http://169.254.169.254
    description: In-guest metadata service

tags:
  - name: Metadata Service
    x-displayName: Metadata Service
    description: Read Leap0 metadata exposed through the in-guest metadata service.

paths:
  /latest/api/token:
    put:
      operationId: createMetadataServiceToken
      summary: Create an IMDSv2 session token
      description: |
        Starts an IMDSv2 session and returns a plaintext metadata token. Include the
        returned token in subsequent metadata requests using the `X-metadata-token`
        header.
      tags: [Metadata Service]
      parameters:
        - name: X-metadata-token-ttl-seconds
          in: header
          required: true
          description: Requested token TTL in seconds. Valid range is 1 to 21600.
          schema:
            type: integer
            minimum: 1
            maximum: 21600
            example: 60
      responses:
        "200":
          description: Token created successfully.
          content:
            text/plain:
              schema:
                type: string
                description: IMDSv2 session token.
                example: AQAAAFJ4bW9ja190b2tlbl9leGFtcGxl
        "400":
          description: Missing or invalid token TTL header.
        "405":
          description: Method not allowed.

  /latest/meta-data/leap0:
    get:
      operationId: getLeap0Metadata
      summary: Read Leap0 metadata
      description: |
        Returns the Leap0 metadata object published through the metadata service.
        Send `Accept: application/json` to receive JSON. Without that header,
        the metadata service responds in IMDS format.
      tags: [Metadata Service]
      parameters:
        - $ref: "#/components/parameters/MetadataToken"
        - $ref: "#/components/parameters/AcceptHeader"
      responses:
        "200":
          description: Leap0 metadata retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataServiceLeap0"
            text/plain:
              schema:
                type: string
                description: IMDS-formatted metadata response.
                example: |
                  exec/
                  mounts/
                  network/
                  sandbox/
                  telemetry/
        "401":
          description: Missing, expired, or invalid IMDSv2 token.
        "404":
          description: Metadata path not found.

  /latest/meta-data/leap0/sandbox:
    get:
      operationId: getLeap0SandboxMetadata
      summary: Read sandbox metadata
      description: |
        Returns sandbox identity metadata for the current sandbox. Send
        `Accept: application/json` to receive JSON. Without that header,
        the metadata service responds in IMDS format.
      tags: [Metadata Service]
      parameters:
        - $ref: "#/components/parameters/MetadataToken"
        - $ref: "#/components/parameters/AcceptHeader"
      responses:
        "200":
          description: Sandbox metadata retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataServiceSandbox"
            text/plain:
              schema:
                type: string
                description: IMDS-formatted metadata response.
                example: |
                  id
        "401":
          description: Missing, expired, or invalid IMDSv2 token.
        "404":
          description: Metadata path not found.

  /latest/meta-data/leap0/exec:
    get:
      operationId: getLeap0ExecMetadata
      summary: Read exec metadata
      description: |
        Returns execution metadata configured for the current sandbox. Send
        `Accept: application/json` to receive JSON. Without that header,
        the metadata service responds in IMDS format.
      tags: [Metadata Service]
      parameters:
        - $ref: "#/components/parameters/MetadataToken"
        - $ref: "#/components/parameters/AcceptHeader"
      responses:
        "200":
          description: Exec metadata retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataServiceExec"
            text/plain:
              schema:
                type: string
                description: IMDS-formatted metadata response.
                example: |
                  command
                  env/
                  user
                  workdir
        "401":
          description: Missing, expired, or invalid IMDSv2 token.
        "404":
          description: Metadata path not found.

  /latest/meta-data/leap0/network:
    get:
      operationId: getLeap0NetworkMetadata
      summary: Read network metadata
      description: |
        Returns guest-visible network metadata for the current sandbox. Send
        `Accept: application/json` to receive JSON. Without that header,
        the metadata service responds in IMDS format.
      tags: [Metadata Service]
      parameters:
        - $ref: "#/components/parameters/MetadataToken"
        - $ref: "#/components/parameters/AcceptHeader"
      responses:
        "200":
          description: Network metadata retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataServiceNetwork"
            text/plain:
              schema:
                type: string
                description: IMDS-formatted metadata response.
                example: |
                  ca_cert_pem
                  dns_resolvers/
        "401":
          description: Missing, expired, or invalid IMDSv2 token.
        "404":
          description: Metadata path not found.

  /latest/meta-data/leap0/telemetry:
    get:
      operationId: getLeap0TelemetryMetadata
      summary: Read telemetry metadata
      description: |
        Returns guest-visible telemetry metadata for the current sandbox. Send
        `Accept: application/json` to receive JSON. Without that header,
        the metadata service responds in IMDS format.
      tags: [Metadata Service]
      parameters:
        - $ref: "#/components/parameters/MetadataToken"
        - $ref: "#/components/parameters/AcceptHeader"
      responses:
        "200":
          description: Telemetry metadata retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataServiceTelemetry"
            text/plain:
              schema:
                type: string
                description: IMDS-formatted metadata response.
                example: |
                  otel_endpoint
        "401":
          description: Missing, expired, or invalid IMDSv2 token.
        "404":
          description: Metadata path not found.

  /latest/meta-data/leap0/mounts:
    get:
      operationId: getLeap0MountMetadata
      summary: Read mount metadata
      description: |
        Returns object storage mount statuses for the current sandbox. Send
        `Accept: application/json` to receive JSON. Without that header,
        the metadata service responds in IMDS format.
      tags: [Metadata Service]
      parameters:
        - $ref: "#/components/parameters/MetadataToken"
        - $ref: "#/components/parameters/AcceptHeader"
      responses:
        "200":
          description: Mount metadata retrieved.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetadataServiceMountStatus"
            text/plain:
              schema:
                type: string
                description: IMDS-formatted metadata response.
                example: |
                  0/
                  1/
        "401":
          description: Missing, expired, or invalid IMDSv2 token.
        "404":
          description: Metadata path not found.

components:
  parameters:
    MetadataToken:
      name: X-metadata-token
      in: header
      required: true
      description: IMDSv2 session token returned by `PUT /latest/api/token`.
      schema:
        type: string
    AcceptHeader:
      name: Accept
      in: header
      required: false
      description: Use `application/json` for JSON output. Without it, the metadata service returns IMDS format.
      schema:
        type: string
        enum: [application/json, text/plain]

  schemas:
    MetadataServiceMountStatus:
      type: object
      required: [id, type, mount_path, status]
      description: Object storage mount status exposed through the in-guest metadata service.
      properties:
        id:
          type: string
          description: Unique mount identifier generated by the platform.
          example: mnt-abc123
        type:
          type: string
          description: Mount implementation type.
          example: object-storage
        bucket:
          type: string
          description: Backing bucket name for the mount.
          example: project-assets
        mount_path:
          type: string
          description: Absolute sandbox path where the mount is exposed.
          example: /data/assets
        status:
          type: string
          enum: [pending, active, failed]
          description: Current mount lifecycle status.
        status_reason:
          type: string
          description: Optional failure detail when the mount is not active.
        read_only:
          type: boolean
          description: Whether the mount is exposed as read-only inside the sandbox.
          default: false

    MetadataServiceLeap0:
      type: object
      required: [schema_version, sandbox, exec, network, telemetry, mounts]
      description: Leap0-specific metadata exposed through the in-guest metadata service.
      properties:
        schema_version:
          type: integer
          description: Metadata payload schema version.
          example: 1
        sandbox:
          $ref: "#/components/schemas/MetadataServiceSandbox"
        exec:
          $ref: "#/components/schemas/MetadataServiceExec"
        network:
          $ref: "#/components/schemas/MetadataServiceNetwork"
        telemetry:
          $ref: "#/components/schemas/MetadataServiceTelemetry"
        mounts:
          type: array
          description: Mount metadata for the sandbox.
          items:
            $ref: "#/components/schemas/MetadataServiceMountStatus"

    MetadataServiceSandbox:
      type: object
      description: Sandbox identity metadata.
      properties:
        id:
          type: string
          description: Sandbox identifier.
          example: sbx-abc123

    MetadataServiceExec:
      type: object
      description: Process execution metadata configured for the sandbox.
      properties:
        command:
          type: string
          description: Shell-escaped command line executed inside the sandbox.
          example: python app.py
        workdir:
          type: string
          description: Working directory for the process.
          example: /workspace
        user:
          type: string
          description: User used to run the process.
          example: root
        env:
          type: object
          description: Environment variables exposed in the execution metadata.
          additionalProperties:
            type: string
          example:
            PORT: "3000"

    MetadataServiceNetwork:
      type: object
      description: Guest-visible network configuration metadata.
      properties:
        dns_resolvers:
          type: array
          description: Approved DNS resolvers configured inside the sandbox.
          items:
            type: string
          example: ["1.1.1.1", "8.8.8.8"]
        ca_cert_pem:
          type: string
          description: CA bundle exposed to the guest, when configured.
          example: "-----BEGIN CERTIFICATE-----..."

    MetadataServiceTelemetry:
      type: object
      description: Guest-visible telemetry configuration.
      properties:
        otel_endpoint:
          type: string
          description: OpenTelemetry export endpoint available inside the sandbox.
          example: http://127.0.0.1:4318
