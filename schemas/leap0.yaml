  # ──────────────────────────────────────────────
  # PTY
  # ──────────────────────────────────────────────
  /v1/sandbox/{sandboxID}/pty:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    get:
      operationId: listPtySessions
      summary: List PTY sessions
      description: List all interactive terminal sessions in the sandbox.
      tags: [PTY]
      responses:
        "200":
          description: PTY sessions retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createPtySession
      summary: Create PTY session
      description: Create a new interactive terminal session. A shell process is spawned inside the sandbox.
      tags: [PTY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PtyCreateRequest"
      responses:
        "201":
          description: PTY session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtySessionInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/pty/{sessionID}:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/sessionID"
    get:
      operationId: getPtySession
      summary: Get PTY session
      description: Get information about a PTY session.
      tags: [PTY]
      responses:
        "200":
          description: PTY session info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtySessionInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePtySession
      summary: Delete PTY session
      description: Kill the shell process and delete the PTY session.
      tags: [PTY]
      responses:
        "204":
          description: PTY session deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/pty/{sessionID}/connect:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/sessionID"
    get:
      operationId: connectPtySession
      summary: Connect to PTY session (WebSocket)
      description: |
        Upgrade to a WebSocket connection for interactive terminal I/O.
        Send terminal input as binary WebSocket messages. Receive terminal output
        as binary WebSocket messages. The connection stays alive until closed by
        either side or the sandbox is deleted.
      tags: [PTY]
      responses:
        "101":
          description: WebSocket connection established.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/pty/{sessionID}/resize:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/sessionID"
    post:
      operationId: resizePtySession
      summary: Resize PTY session
      description: Change the terminal dimensions of a PTY session.
      tags: [PTY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PtyResizeRequest"
      responses:
        "200":
          description: PTY session resized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtySessionInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

