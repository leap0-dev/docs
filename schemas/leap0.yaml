        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/lsp/completions:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: lspCompletions
      summary: Get completions
      description: Request code completions at a given position in a document.
      tags: [LSP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LspCompletionRequest"
      responses:
        "200":
          description: JSON-RPC 2.0 response from the language server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LspJsonRpcResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/lsp/document-symbols:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: lspDocumentSymbols
      summary: Get document symbols
      description: Request all symbols (functions, classes, variables) in a document.
      tags: [LSP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LspDocumentRequest"
      responses:
        "200":
          description: JSON-RPC 2.0 response from the language server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LspJsonRpcResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/lsp/did-open:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: lspDidOpen
      summary: Notify document opened
      description: Notify the language server that a document was opened. Must be called before requesting completions or symbols.
      tags: [LSP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LspDidOpenRequest"
      responses:
        "204":
          description: Notification sent.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/lsp/did-close:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: lspDidClose
      summary: Notify document closed
      description: Notify the language server that a document was closed.
      tags: [LSP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LspDocumentRequest"
      responses:
        "204":
          description: Notification sent.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # SSH
  # ──────────────────────────────────────────────
  /v1/sandbox/{sandboxID}/ssh/access:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: createSshAccess
      summary: Create SSH access
      description: Create SSH access credentials for a sandbox.
      tags: [SSH]
      responses:
        "201":
          description: SSH access created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshCreateAccessDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/sandbox/{sandboxID}/ssh/{sshID}:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/sshID"
    delete:
      operationId: deleteSshAccess
      summary: Delete SSH access
      description: Remove a specific SSH access credential from a sandbox.
      tags: [SSH]
      responses:
        "204":
          description: SSH access deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/ssh/{sshID}/validate:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/sshID"
    post:
      operationId: validateSshAccess
      summary: Validate SSH access
      description: Check whether a specific SSH access credential is valid and not expired.
      tags: [SSH]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SshAccessValidateRequest"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshAccessValidationDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/ssh/{sshID}/regen:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/sshID"
    post:
      operationId: regenSshAccess
      summary: Regenerate SSH access
      description: Regenerate a specific SSH access credential for a sandbox. The old credential is invalidated.
      tags: [SSH]
      responses:
        "200":
          description: SSH access regenerated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshAccessDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  # ──────────────────────────────────────────────
  # Security Schemes
  # ──────────────────────────────────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        API key passed as a Bearer token in the `Authorization` header.
        Alternatively, use the `leap0-authorization` header.

  # ──────────────────────────────────────────────
  # Parameters
  # ──────────────────────────────────────────────
  parameters:
    sandboxID:
      name: sandboxID
      in: path
      required: true
      description: Unique sandbox identifier.
      schema:
        type: string
    mountID:
      name: mountID
      in: path
      required: true
      description: Unique mount identifier.
      schema:
        type: string
    sshID:
      name: sshID
      in: path
      required: true
      description: Unique SSH credential identifier.
      schema:
        type: string
    sessionID:
      name: sessionID
      in: path
      required: true
      description: Unique session identifier.
      schema:
        type: string
    snapshotID:
      name: snapshotID
      in: path
      required: true
      description: Unique snapshot identifier.
      schema:
        type: string
    presignedURLID:
      name: id
      in: path
      required: true
      description: Presigned URL resource identifier.
      schema:
        type: string
  # ──────────────────────────────────────────────
  # Reusable Responses
  # ──────────────────────────────────────────────
  responses:
    BadRequest:
      description: Bad request – validation error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    Unauthorized:
      description: Unauthorized – invalid or missing API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ──────────────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────────────
  schemas:
    # ── Error ──
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Human-readable error message.

    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          description: Summary message, e.g. "Invalid request".
        errors:
          type: array
          items:
            type: object
            required: [field, error]
            properties:
              field:
                type: string
                description: JSON field name that failed validation (e.g. "path", "command").
              error:
                type: string
                description: Human-readable description of the validation failure.

    # ── Sandbox ──
    SandboxCreateRequest:
      type: object
      required: [template_name]
      properties:
        template_name:
          type: string
          description: Name of the template to create the sandbox from.
          example: my-template
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: Environment variables to set in the sandbox.
        mounts:
          type: array
          maxItems: 8
          description: Read-only object storage mounts to attach before boot. They are exposed inside the sandbox through a lazy FUSE mount, while credentials stay on the runner and are not exposed inside the sandbox.
          items:
            $ref: "#/components/schemas/MountRequest"
        vcpu:
          type: integer
          minimum: 1
          maximum: 8
          default: 1
          description: Number of virtual CPUs. Defaults to 1 if not provided.
          example: 2
        memory:
          type: integer
          format: int64
          minimum: 512
          maximum: 8192
          default: 1024
          description: Memory in MiB. Must be an even number. Defaults to 1024 if not provided.
          example: 1024
        timeout:
          type: integer
          format: int64
          minimum: 1
          maximum: 28800
          description: Sandbox timeout in seconds. Defaults to 300 if not provided.
          example: 600
        auto_pause:
          type: boolean
          default: false
          description: Automatically pause the sandbox into a snapshot when it reaches its timeout.
        network_policy:
          nullable: true
          $ref: "#/components/schemas/NetworkPolicy"

    SandboxCreateResponse:
      type: object
      required: [id, template_id, vcpu, memory, disk, timeout, state, auto_pause, created_at]
      properties:
        id:
          type: string
          description: Unique sandbox identifier.
          example: sbx-abc123
        template_id:
          type: string
          description: Template the sandbox was created from.
        mounts:
          type: array
          items:
            $ref: "#/components/schemas/Mount"
          description: Object storage mounts attached to the sandbox. Credentials are omitted from responses.
        vcpu:
          type: integer
          minimum: 1
          description: Number of virtual CPUs assigned to the sandbox.
        memory:
          type: integer
          format: int64
          minimum: 1
          description: Memory assigned to the sandbox, in MiB.
        disk:
          type: integer
          format: int64
          minimum: 1
          description: Writable disk size assigned to the sandbox, in MiB.
        timeout:
          type: integer
          format: int64
          minimum: 1
          maximum: 28800
          description: Sandbox timeout in seconds.
        state:
          type: string
          enum: [starting, running, snapshotting, paused, unpausing, deleting, deleted]
          description: Current state of the sandbox.
        auto_pause:
          type: boolean
          description: Whether the sandbox is configured to auto-pause on timeout.
        network_policy:
          nullable: true
          $ref: "#/components/schemas/NetworkPolicy"
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the sandbox was created.

    SandboxListItem:
      type: object
      required: [id, template_id, pod_id, state, created_at]
      properties:
        id:
          type: string
          description: Unique sandbox identifier.
          example: sbx-abc123
        template_id:
          type: string
          description: Template the sandbox was created from.
        pod_id:
          type: string
          description: Runner pod handling the sandbox. Empty when not yet assigned.
        state:
          type: string
          enum: [starting, snapshotting, running, paused, unpausing, deleting]
          description: Current state of the sandbox.
        launch_time:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the sandbox VM launched.
        state_change_time:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the last sandbox state change.
        timeout_at:
          type: integer
          format: int64
          description: Unix timestamp, in seconds, when the sandbox will time out.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the sandbox was created.

    ListSandboxesResponse:
      type: object
      required: [items, total_items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SandboxListItem"
        total_items:
          type: integer
          minimum: 0
          description: Total number of matching sandboxes before pagination.

    # ── Snapshot ──
    SnapshotCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Optional snapshot name. If omitted, Leap0 generates one.
          example: workspace-warm

    SnapshotCreateResponse:
      type: object
      required: [id, name, template_id, vcpu, memory, disk, created_at]
      properties:
        id:
          type: string
          description: Unique snapshot identifier.
          example: snap-abc123
        name:
          type: string
          description: Snapshot name.
          example: workspace-warm
        template_id:
          type: string
          description: Template the snapshot was created from.
        vcpu:
          type: integer
          minimum: 1
          description: Number of virtual CPUs stored with the snapshot.
        memory:
          type: integer
          format: int64
          minimum: 1
          description: Memory stored with the snapshot, in MiB.
        disk:
          type: integer
          format: int64
          minimum: 1
          description: Writable disk size stored with the snapshot, in MiB.
        network_policy:
          nullable: true
          $ref: "#/components/schemas/NetworkPolicy"
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the snapshot was created.

    ListSnapshotsResponse:
      type: object
      required: [items, total_items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotCreateResponse"
        total_items:
          type: integer
          minimum: 0
          description: Total number of matching snapshots before pagination.

    SnapshotPauseResponse:
      type: object
      required: [id, name, template_id, vcpu, memory, disk, state, created_at]
      properties:
        id:
          type: string
          description: Unique snapshot identifier.
          example: snap-abc123
        name:
          type: string
          description: Snapshot name.
          example: workspace-warm
        template_id:
          type: string
          description: Template the snapshot was created from.
        vcpu:
          type: integer
          minimum: 1
          description: Number of virtual CPUs stored with the snapshot.
        memory:
          type: integer
          format: int64
          minimum: 1
          description: Memory stored with the snapshot, in MiB.
        disk:
          type: integer
          format: int64
          minimum: 1
          description: Writable disk size stored with the snapshot, in MiB.
        state:
          type: string
          enum: [paused]
          description: The sandbox state after the snapshot-pause operation completes.
        network_policy:
          nullable: true
          $ref: "#/components/schemas/NetworkPolicy"
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the snapshot was created.

    SnapshotResumeRequest:
      type: object
      required: [snapshot_name]
      properties:
        snapshot_name:
          type: string
          description: Name of the snapshot to restore.
          example: workspace-warm
        timeout:
          type: integer
          format: int64
          minimum: 1
          maximum: 28800
          description: Sandbox timeout in seconds. Defaults to 300 if not provided.
          example: 1800
        auto_pause:
          type: boolean
          default: false
          description: Enable auto-pause for the restored sandbox.
        network_policy:
          nullable: true
          $ref: "#/components/schemas/NetworkPolicy"

    SandboxStatusResponse:
      type: object
      required: [id, template_id, vcpu, memory, disk, timeout, state, auto_pause, created_at]
      properties:
        id:
          type: string
          description: Unique sandbox identifier.
        template_id:
          type: string
          description: Template the sandbox was created from.
        mounts:
          type: array
          items:
            $ref: "#/components/schemas/Mount"
          description: Object storage mounts currently attached to the sandbox. Credentials are omitted from responses.
        vcpu:
          type: integer
          minimum: 1
          description: Number of virtual CPUs assigned to the sandbox.
        memory:
          type: integer
          format: int64
          minimum: 1
          description: Memory assigned to the sandbox, in MiB.
        disk:
          type: integer
          format: int64
          minimum: 1
          description: Writable disk size assigned to the sandbox, in MiB.
        timeout:
          type: integer
          format: int64
          minimum: 1
          maximum: 28800
          description: Sandbox timeout in seconds.
        state:
          type: string
          enum: [starting, running, snapshotting, paused, unpausing, deleting, deleted]
          description: Current state of the sandbox.
        auto_pause:
          type: boolean
          description: Whether the sandbox is configured to auto-pause on timeout.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the sandbox was created.

    SandboxUserHomeDirResponse:
      type: object
      required: [user_home_dir]
      properties:
        user_home_dir:
          type: string
          description: Resolved home directory for the sandbox user.
          example: /home/user

    SandboxWorkdirResponse:
      type: object
      required: [workdir]
      properties:
        workdir:
          type: string
          description: Configured working directory for the sandbox init command.
          example: /workspace

    PresignedURLCreateRequest:
      type: object
      required: [port]
      properties:
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Sandbox port exposed through the public URL.
          example: 8080
        expires_in:
          type: integer
          format: int64
          minimum: 1
          description: Optional TTL in seconds. Defaults to 3600.
          example: 900

    PresignedURLResponse:
      type: object
      required: [id, token, url, sandbox_id, port, expires_at, created_at]
      properties:
        id:
          type: string
          description: Unique presigned URL identifier.
          example: psu-abc123
        token:
          type: string
          description: Raw token. Only returned once at creation time.
        url:
          type: string
          format: uri
          description: Fully qualified HTTPS URL.
          example: https://abcdef1234567890.leap0.app
        sandbox_id:
          type: string
          description: Sandbox the URL routes to.
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Sandbox port exposed by the URL.
        expires_at:
          type: string
          format: date-time
          description: When the presigned URL expires.
        created_at:
          type: string
          format: date-time
          description: When the presigned URL was created.

    # ── Filesystem ──
    FileInfo:
      type: object
      required:
        - name
        - path
        - is_dir
        - size
        - mode
        - mtime
        - owner
        - group
        - is_symlink
      properties:
        name:
          type: string
          description: File or directory name.
        path:
          type: string
          description: Full path.
        is_dir:
          type: boolean
          description: Whether this entry is a directory.
        size:
          type: integer
          format: uint64
          description: File size in bytes.
        mode:
          type: string
          description: "Octal permission string (e.g. `755`)."
        mtime:
          type: integer
          format: int64
          description: Last modification time as Unix timestamp (seconds).
        owner:
          type: string
          description: File owner.
        group:
          type: string
          description: File group.
        is_symlink:
          type: boolean
          description: Whether this entry is a symbolic link.
        link_target:
          type: string
          description: Target path if this entry is a symbolic link.

    LSResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FileInfo"
          description: List of file and directory entries.

    GlobResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: string
          description: List of matching file paths.

    GrepResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchMatch"
          description: List of search matches.

    EditFilesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EditResult"
          description: Per-file replacement results.

    SearchMatch:
      type: object
      required: [path, line, content]
      properties:
        path:
          type: string
          description: File path containing the match.
        line:
          type: integer
          format: uint64
          description: Line number of the match.
        content:
          type: string
          description: Content of the matching line.

    EditResult:
      type: object
      required: [file, success]
      properties:
        file:
          type: string
          description: File path.
        success:
          type: boolean
          description: Whether the replacement succeeded.
        error:
          type: string
          description: Error message if the replacement failed.

    LSRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Directory path to list.
          example: /home/user
        recursive:
          type: boolean
          default: false
          description: List contents recursively.
        exclude:
          type: array
          items:
            type: string
          description: "Glob patterns to exclude (e.g. `node_modules`, `.git`)."

    StatRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the file or directory.

    MkdirRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Directory path to create.
        recursive:
          type: boolean
          default: false
          description: Create parent directories as needed.
        permissions:
          type: string
          nullable: true
          description: "Octal permission string (e.g. `755`). Defaults to `755`."
          default: "755"

    ReadFileRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the file to read.
        offset:
          type: integer
          format: uint64
          description: Byte offset to start reading from.
        limit:
          type: integer
          format: uint32
          description: Maximum number of bytes to read.
        head:
          type: integer
          format: uint32
          description: Return only the first N lines of the file. Mutually exclusive with `tail`.
        tail:
          type: integer
          format: uint32
          description: Return only the last N lines of the file. Mutually exclusive with `head`.

    ReadFilesRequest:
      type: object
      required: [paths]
      properties:
        paths:
          type: array
          minItems: 1
          items:
            type: string
          description: List of file paths to read.

    DeleteRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to delete.
        recursive:
          type: boolean
          default: false
          description: Recursively delete directory contents.

    SetPermissionsRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the file or directory.
        mode:
          type: string
          nullable: true
          description: "Octal permission string (e.g. `755`)."
        owner:
          type: string
          nullable: true
          description: New owner name.
        group:
          type: string
          nullable: true
          description: New group name.

    GlobRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Base directory to search from.
        pattern:
          type: string
          nullable: true
          description: Glob pattern to match file names against.
        exclude:
          type: array
          items:
            type: string
          description: "Glob patterns to exclude (e.g. `node_modules`, `.git`)."

    GrepRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Base directory to search from.
        pattern:
          type: string
          nullable: true
          description: Text pattern to search for within files.
        include:
          type: string
          nullable: true
          description: "File pattern filter e.g. *.go"
        exclude:
          type: array
          items:
            type: string
          description: "Glob patterns to exclude (e.g. `node_modules`, `.git`)."

    EditFileRequest:
      type: object
      required: [path, edits]
      properties:
        path:
          type: string
          description: Path to the file.
        edits:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/FileEdit"
          description: List of find-and-replace edits to apply.

    FileEdit:
      type: object
      required: [find]
      properties:
        find:
          type: string
          description: Text to find.
        replace:
          type: string
          nullable: true
          description: Replacement text.

    EditFileResponse:
      type: object
      required: [diff, replacements]
      properties:
        diff:
          type: string
          description: Unified diff of the changes made.
        replacements:
          type: integer
          description: Total number of replacements made.

    EditFilesRequest:
      type: object
      required: [files, find]
      properties:
        files:
          type: array
          minItems: 1
          items:
            type: string
          description: List of file paths to perform replacements in.
        find:
          type: string
          description: Text to find in the files.
        replace:
          type: string
          nullable: true
          description: Replacement text.

    MoveRequest:
      type: object
      required: [src_path, dst_path]
      properties:
        src_path:
          type: string
          description: Source path.
        dst_path:
          type: string
          description: Destination path.
        overwrite:
          type: boolean
          default: false
          description: Overwrite destination if it exists.

    CopyRequest:
      type: object
      required: [src_path, dst_path]
      properties:
        src_path:
          type: string
          description: Source path.
        dst_path:
          type: string
          description: Destination path.
        recursive:
          type: boolean
          default: false
          description: Copy directory contents recursively.
        overwrite:
          type: boolean
          default: false
          description: Overwrite destination if it exists.

    ExistsRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to check.

    ExistsResponse:
      type: object
      required: [exists]
      properties:
        exists:
          type: boolean
          description: Whether the path exists.

    TreeRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Root directory path for the tree.
        exclude:
          type: array
          items:
            type: string
          description: "Glob patterns to exclude (e.g. `node_modules`, `.git`)."
        max_depth:
          type: integer
          description: Maximum depth to traverse.

    TreeResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TreeEntry"
          description: Hierarchical directory tree entries.

    TreeEntry:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          description: File or directory name.
        type:
          type: string
          enum: [file, directory]
          description: Whether this entry is a file or directory.
        children:
          type: array
          items:
            $ref: "#/components/schemas/TreeEntry"
          description: Child entries (only present for directories).

    # ── Git ──
    GitResult:
      type: object
      required: [output, exit_code]
      properties:
        output:
          type: string
          description: Command output text.
        exit_code:
          type: integer
          format: int32
          description: Exit code of the git command.

    GitCommitResponse:
      type: object
      required: [sha, result]
      properties:
        sha:
          type: string
          description: SHA of the created commit.
        result:
          $ref: "#/components/schemas/GitResult"

    GitCloneRequest:
      type: object
      required: [url, path]
      properties:
        url:
          type: string
          description: Repository URL to clone.
          example: https://github.com/user/repo.git
        path:
          type: string
          description: Destination path inside the sandbox.
          example: /home/user/repo
        branch:
          type: string
          nullable: true
          description: Branch to clone.
        commit_id:
          type: string
          nullable: true
          description: Specific commit to checkout after cloning.
        depth:
          type: integer
          format: uint32
          description: Shallow clone depth.
        username:
          type: string
          nullable: true
          description: Username for authentication.
        password:
          type: string
          nullable: true
          description: Password or token for authentication.

    GitPathRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the git repository.

    GitContextRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the git repository.
        context_lines:
          type: integer
          format: uint32
          description: Number of context lines to include in the diff output. Defaults to 3.

    GitDiffRequest:
      type: object
      required: [path, target]
      properties:
        path:
          type: string
          description: Path to the git repository.
        target:
          type: string
          description: Branch, tag, or commit to compare against.
        context_lines:
          type: integer
          format: uint32
          description: Number of context lines to include in the diff output. Defaults to 3.

    GitLogRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the git repository.
        max_count:
          type: integer
          format: uint32
          description: Maximum number of commits to show. Defaults to 10.
        start_timestamp:
          type: string
          nullable: true
          description: Start timestamp filter for commit history.
        end_timestamp:
          type: string
          nullable: true
          description: End timestamp filter for commit history.

    GitShowRequest:
      type: object
      required: [path, revision]
      properties:
        path:
          type: string
          description: Path to the git repository.
        revision:
          type: string
          description: Revision to show, such as a commit SHA, branch, or tag.

    GitBranchesRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the git repository.
        branch_type:
          type: string
          nullable: true
          enum: [local, remote, all]
          description: Whether to list local, remote, or all branches.
        contains:
          type: string
          nullable: true
          description: Only include branches that contain the given commit SHA.
        not_contains:
          type: string
          nullable: true
          description: Only include branches that do not contain the given commit SHA.

    GitCreateBranchRequest:
      type: object
      required: [path, name]
      properties:
        path:
          type: string
          description: Path to the git repository.
        name:
          type: string
          description: Name of the new branch.
        checkout:
          type: boolean
          description: Checkout the branch after creating it.
        base_branch:
          type: string
          nullable: true
          description: Optional base branch or revision to create the branch from.

    GitCheckoutBranchRequest:
      type: object
      required: [path, branch]
      properties:
        path:
          type: string
          description: Path to the git repository.
        branch:
          type: string
          description: Branch name to checkout.
        create:
          type: boolean
          description: Create the branch if it doesn't exist.

    GitDeleteBranchRequest:
      type: object
      required: [path, name]
      properties:
        path:
          type: string
          description: Path to the git repository.
        name:
          type: string
          description: Branch name to delete.
        force:
          type: boolean
          description: Force delete even if the branch is not fully merged.

    GitAddRequest:
      type: object
      required: [path, files]
      properties:
        path:
          type: string
          description: Path to the git repository.
        files:
          type: array
          minItems: 1
          items:
            type: string
          description: List of file paths to stage.

    GitCommitRequest:
      type: object
      required: [path, message]
      properties:
        path:
          type: string
          description: Path to the git repository.
        message:
          type: string
          description: Commit message.
        author:
          type: string
          nullable: true
          description: Author name for the commit.
        email:
          type: string
          nullable: true
          description: Author email for the commit.
        allow_empty:
          type: boolean
          description: Allow creating an empty commit.

    GitPushPullRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to the git repository.
        remote:
          type: string
          nullable: true
          description: Remote name (defaults to `origin`).
        branch:
          type: string
          nullable: true
          description: Branch name.
        set_upstream:
          type: boolean
          description: Set upstream tracking reference (push only).
        rebase:
          type: boolean
          description: Rebase instead of merge (pull only).
        username:
          type: string
          nullable: true
          description: Username for authentication.
        password:
          type: string
          nullable: true
          description: Password or token for authentication.

    # ── Template ──
    UploadTemplateRequest:
      type: object
      required: [name, uri]
      properties:
        name:
          type: string
          description: Template name. Must not start with a system prefix or contain whitespace.
          example: my-python-app
        uri:
          type: string
          maxLength: 500
          description: Container image URI to pull and convert.
          example: docker.io/library/python:3.12
        credentials:
          $ref: "#/components/schemas/RegistryCredentials"

    RegistryCredentials:
      type: object
      required: [type]
      description: Credentials for pulling from a private container registry.
      properties:
        type:
          type: string
          enum: [basic, aws, gcp, azure]
          description: Authentication type.
        username:
          type: string
          description: Username (required when `type` is `basic`).
        password:
          type: string
          description: Password (required when `type` is `basic`).
        aws_access_key_id:
          type: string
          description: AWS access key ID (required when `type` is `aws`).
        aws_secret_access_key:
          type: string
          description: AWS secret access key (required when `type` is `aws`).
        aws_region:
          type: string
          description: AWS region (optional, for ECR).
        gcp_service_account_json:
          type: string
          description: GCP service account JSON key (required when `type` is `gcp`).
        azure_client_id:
          type: string
          description: Azure client ID (required when `type` is `azure`).
        azure_client_secret:
          type: string
          description: Azure client secret (required when `type` is `azure`).
        azure_tenant_id:
          type: string
          description: Azure tenant ID (required when `type` is `azure`).
      oneOf:
        - properties:
            type:
              enum: [basic]
          required: [username, password]
        - properties:
            type:
              enum: [aws]
          required: [aws_access_key_id, aws_secret_access_key]
        - properties:
            type:
              enum: [gcp]
          required: [gcp_service_account_json]
        - properties:
            type:
              enum: [azure]
          required: [azure_client_id, azure_client_secret, azure_tenant_id]

    RenameTemplateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: New template name.

    UploadTemplateResponse:
      type: object
      required: [id, name, digest, image_config, is_system, created_at]
      properties:
        id:
          type: string
          description: The created template ID.
          example: tpl-abc123
        name:
          type: string
          description: The created template name.
          example: my-python-app
        digest:
          type: string
          description: The container image digest used for this template.
          example: sha256:0123456789abcdef
        image_config:
          type: object
          required: [entrypoint, cmd]
          properties:
            entrypoint:
              type: array
              items:
                type: string
              nullable: true
            cmd:
              type: array
              items:
                type: string
              nullable: true
            working_dir:
              type: string
            user:
              type: string
              description: The OS user that the container process runs as.
              example: user
            env:
              type: object
              nullable: true
              additionalProperties:
                type: string
        is_system:
          type: boolean
          description: Whether this template is a system template.
          example: false
        created_at:
          type: string
          format: date-time
          description: When the template was created.
          example: 2026-02-08T12:34:56Z

    # ── Process ──
    ExecuteRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
          description: Shell command to execute.
          example: "python3 --version"
        cwd:
          type: string
          nullable: true
          description: Working directory for the command.
          example: /home/user
        envs:
          type: object
          additionalProperties:
            type: string
          description: Environment variables applied only to the spawned process for this request.
          example:
            NAME: leap0
            PLACE: sandbox
        timeout:
          type: integer
          description: Timeout in seconds (default 30).
          example: 30

    ExecuteResponse:
      type: object
      required: [exit_code, stdout, stderr]
      properties:
        exit_code:
          type: integer
          description: Process exit code.
          example: 0
        stdout:
          type: string
          description: Standard output captured from the process.
          example: "Python 3.12.12\n"
        stderr:
          type: string
          description: Standard error captured from the process.
          example: ""

    # ── PTY ──
    PtyCreateRequest:
      type: object
      properties:
        id:
          type: string
          nullable: true
          description: Optional session ID. Auto-generated if not provided.
          example: my-terminal
        cwd:
          type: string
          nullable: true
          description: Starting directory.
          example: /home/user
        envs:
          type: object
          additionalProperties:
            type: string
          description: Environment variables.
          example:
            TERM: xterm-256color
        cols:
          type: integer
          description: Terminal columns.
          example: 120
        rows:
          type: integer
          description: Terminal rows.
          example: 40
        lazy_start:
          type: boolean
          description: Defer shell process start until first WebSocket connection.
          default: false

    PtySessionInfo:
      type: object
      required:
        - id
        - cwd
        - envs
        - cols
        - rows
        - created_at
        - active
        - lazy_start
      properties:
        id:
          type: string
          example: my-terminal
        cwd:
          type: string
          example: /home/user
        envs:
          type: object
          additionalProperties:
            type: string
        cols:
          type: integer
          example: 120
        rows:
          type: integer
          example: 40
        created_at:
          type: string
          format: date-time
        active:
          type: boolean
        lazy_start:
          type: boolean

    PtyListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PtySessionInfo"

    PtyResizeRequest:
      type: object
      required: [cols, rows]
      properties:
        cols:
          type: integer
          description: New terminal columns.
          example: 200
        rows:
          type: integer
          description: New terminal rows.
          example: 50

    # ── LSP ──
    LspServerRequest:
      type: object
      required: [language_id, path_to_project]
      properties:
        language_id:
          type: string
          description: "Language identifier: `python`, `typescript`, or `javascript`."
          example: python
        path_to_project:
          type: string
          description: Path to the project directory inside the sandbox.
          example: /home/user/project

    LspSuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true

    LspJsonRpcResponse:
      type: object
      description: JSON-RPC 2.0 response envelope returned by LSP request endpoints.
      required: [jsonrpc]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
            - type: string
            - type: "null"
          description: Request identifier echoed by the language server.
        result:
          description: Method-specific success payload.
        error:
          $ref: "#/components/schemas/LspJsonRpcError"
      oneOf:
        - required: [result]
        - required: [error]

    LspJsonRpcError:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: JSON-RPC error code.
          example: -32602
        message:
          type: string
          description: Human-readable error message.
          example: Invalid params
        data:
          description: Optional method-specific error data.

    LspCompletionRequest:
      type: object
      required: [language_id, path_to_project, uri, position]
      properties:
        language_id:
          type: string
          example: python
        path_to_project:
          type: string
          example: /home/user/project
        uri:
          type: string
          description: Document URI.
          example: "file:///home/user/project/main.py"
        position:
          $ref: "#/components/schemas/LspPosition"
        context:
          $ref: "#/components/schemas/LspCompletionContext"

    LspCompletionContext:
      type: object
      properties:
        trigger_kind:
          type: integer
          description: Completion trigger kind.
          example: 1
        trigger_character:
          type: string
          description: Trigger character when completion was invoked by a specific character.
          example: "."

    LspDocumentRequest:
      type: object
      required: [language_id, path_to_project, uri]
      properties:
        language_id:
          type: string
          example: python
        path_to_project:
          type: string
          example: /home/user/project
        uri:
          type: string
          example: "file:///home/user/project/main.py"

    LspDidOpenRequest:
      type: object
      required: [language_id, path_to_project, uri]
      properties:
        language_id:
          type: string
          example: python
        path_to_project:
          type: string
          example: /home/user/project
        uri:
          type: string
          example: "file:///home/user/project/main.py"
        text:
          type: string
          nullable: true
          description: Full document text.
        version:
          type: integer
          description: Document version number.
          example: 1

    LspPosition:
      type: object
      required: [line, character]
      properties:
        line:
          type: integer
          description: Zero-based line number.
          example: 10
        character:
          type: integer
          description: Zero-based character offset.
          example: 3

    # ── Network Policy ──
    NetworkPolicy:
      type: object
      required: [mode]
      description: Network egress policy for a sandbox. When omitted, defaults to allow-all.
      properties:
        mode:
          type: string
          enum: [allow-all, deny-all, custom]
          description: Policy mode. `allow-all` permits all egress, `deny-all` blocks all egress, `custom` uses the allow/deny lists.
        allow_domains:
          type: array
          maxItems: 50
          items:
            type: string
          description: Domain names to allow outbound access to (custom mode only).
        allow_cidrs:
          type: array
          maxItems: 10
          items:
            type: string
            format: cidr
          description: CIDR ranges to allow outbound access to (custom mode only).
        transforms:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/TransformRule"
          description: Per-domain request transforms, such as credential brokering.

    TransformRule:
      type: object
      required: [domain]
      description: A per-domain request transform rule for credential brokering or header manipulation.
      properties:
        domain:
          type: string
          description: Domain pattern to match (e.g. `api.openai.com`).
        inject_headers:
          type: object
          additionalProperties:
            type: string
          description: Headers to inject into matching requests.
        strip_headers:
          type: array
          items:
            type: string
          description: Header names to strip from matching requests.

    MountRequest:
      type: object
      required: [type, bucket, mount_path, endpoint]
      description: Attach a read-only standard S3 bucket to a directory inside the sandbox. The runner keeps the credentials and serves object metadata and file reads lazily over vsock-backed FUSE; credentials are not sent into the sandbox guest. Omit credentials for public buckets.
      properties:
        type:
          type: string
          enum: [object-storage]
          description: Mount implementation type.
        bucket:
          type: string
          description: Bucket name in the S3-compatible object storage provider.
          example: project-assets
        mount_path:
          type: string
          description: Absolute sandbox path where the bucket contents will appear.
          example: /data/assets
        endpoint:
          type: string
          format: uri
          description: Full S3-compatible endpoint URL.
          example: https://storage.example.com
        prefix:
          type: string
          description: Optional key prefix within the bucket. Must end with a trailing slash when provided.
          example: docs/
        read_only:
          type: boolean
          description: Whether the mount is read-only. Object storage mounts are currently read-only.
          default: true
        access_key_id:
          type: string
          description: Access key id for the S3 bucket. Omit for public buckets.
        secret_access_key:
          type: string
          description: Secret access key for the S3 bucket. Omit for public buckets.

    MountUpdateRequest:
      type: object
      description: |
        Update an existing object storage mount. Any omitted field keeps its current
        value. `id` and `type` are immutable and cannot be changed. Set `prefix`,
        `access_key_id`, or `secret_access_key` to an empty string to clear them.
      properties:
        bucket:
          type: string
          description: Bucket name in the S3-compatible object storage provider.
          example: project-assets
        mount_path:
          type: string
          description: Absolute sandbox path where the bucket contents will appear.
          example: /data/assets
        endpoint:
          type: string
          format: uri
          description: Full S3-compatible endpoint URL.
          example: https://storage.example.com
        prefix:
          type: string
          description: Optional object prefix to expose as the visible mount root. Use an empty string to clear it.
          example: builds/
        read_only:
          type: boolean
          description: Whether the mount should be attached read-only inside the sandbox.
        access_key_id:
          type: string
          description: Access key id for the S3 bucket. Use an empty string to clear it.
        secret_access_key:
          type: string
          description: Secret access key for the S3 bucket. Use an empty string to clear it.

    Mount:
      type: object
      required: [id, type, bucket, mount_path]
      description: Non-secret object storage mount metadata returned by the API.
      properties:
        id:
          type: string
          description: Unique mount identifier generated by the platform.
          example: mnt-abc123
        type:
          type: string
          enum: [object-storage]
        bucket:
          type: string
        mount_path:
          type: string
        prefix:
          type: string
        read_only:
          type: boolean

    # ── SSH ──
    SshCreateAccessDto:
      type: object
      required: [id, sandbox_id, password, expires_at, created_at, updated_at, ssh_command]
      properties:
        id:
          type: string
          description: Unique identifier for the SSH access. Used as the SSH username.
        sandbox_id:
          type: string
          description: ID of the sandbox this SSH access is for.
        password:
          type: string
          description: SSH password. Used as the password when connecting via SSH.
        expires_at:
          type: string
          format: date-time
          description: When the SSH access expires.
        created_at:
          type: string
          format: date-time
          description: When the SSH access was created.
        updated_at:
          type: string
          format: date-time
          description: When the SSH access was last updated.
        ssh_command:
          type: string
          description: SSH command to connect to the sandbox.

    SshAccessDto:
      type: object
      required: [id, sandbox_id, password, expires_at, created_at, updated_at, ssh_command]
      properties:
        id:
          type: string
          description: Unique identifier for the SSH access. Used as the SSH username.
        sandbox_id:
          type: string
          description: ID of the sandbox this SSH access is for.
        password:
          type: string
          description: SSH password. Used as the password when connecting via SSH.
        expires_at:
          type: string
          format: date-time
          description: When the SSH access expires.
        created_at:
          type: string
          format: date-time
          description: When the SSH access was created.
        updated_at:
          type: string
          format: date-time
          description: When the SSH access was last updated.
        ssh_command:
          type: string
          description: SSH command to connect to the sandbox.

    SshAccessValidateRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: SSH access password to validate.

    SshAccessValidationDto:
      type: object
      required: [valid, sandbox_id]
      properties:
        valid:
          type: boolean
          description: Whether the SSH access credentials are valid.
        sandbox_id:
          type: string
          description: ID of the sandbox this SSH access is for.
