openapi: 3.1.0
info:
  title: Leap0 API
  description: Leap0 is secure infrastructure for running AI-generated code. Manage sandboxes, filesystems, git operations, and templates.
  version: 1.0.0

servers:
  - url: https://api.leap0.dev
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Sandbox
    description: Create, inspect, and delete sandboxes.
  - name: Snapshot
    description: Save running sandboxes and restore new sandboxes from saved state.
  - name: Template
    description: Upload and manage container image templates.
  - name: Filesystem
    description: Perform filesystem operations inside a sandbox.
  - name: Git
    description: Perform git operations inside a sandbox.
  - name: Process
    description: Execute commands and manage shell sessions inside a sandbox.
  - name: PTY
    description: Create and manage interactive terminal sessions inside a sandbox.
  - name: LSP
    description: Start and interact with language servers (Python, TypeScript) inside a sandbox.
  - name: SSH
    description: Manage SSH access to sandboxes.
  - name: Presigned URL
    description: Create temporary public URLs that route to a specific sandbox port.
paths:
  # ──────────────────────────────────────────────
  # Sandbox CRUD
  # ──────────────────────────────────────────────
  /v1/sandbox/:
    post:
      operationId: createSandbox
      summary: Create a sandbox
      description: |
        Create a new sandbox from a template. The sandbox will start booting immediately.
        A maximum of 3 sandboxes per organization is enforced.
      tags: [Sandbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxCreateRequest"
      responses:
        "201":
          description: Sandbox created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxCreateResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          description: Unauthorized – invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict – sandbox limit reached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sandbox/{sandboxID}/:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    get:
      operationId: getSandbox
      summary: Get sandbox status
      description: Returns the current status of a sandbox.
      tags: [Sandbox]
      responses:
        "200":
          description: Sandbox status retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxStatusResponse"
        "401":
          description: Unauthorized - invalid or missing API key, or private registry authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSandbox
      summary: Delete a sandbox
      description: |
        Delete a sandbox. Running sandboxes are terminated first. Paused sandboxes are
        deleted directly. Requests fail while the sandbox is in a transition state.
      tags: [Sandbox]
      responses:
        "204":
          description: Sandbox deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - sandbox is currently transitioning.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sandbox/{sandboxID}/pause:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: pauseSandbox
      summary: Pause a sandbox
      description: |
        Pause a running sandbox. The sandbox's VM state, memory, and disk are captured
        and uploaded, the sandbox is marked as paused, and the VM is terminated. The
        sandbox can later be resumed via the invoke route or the resume endpoint, which
        restores it from the saved state. Unlike `/snapshot/pause`, this does **not**
        create a named snapshot.
      tags: [Sandbox]
      responses:
        "201":
          description: Sandbox paused successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxCreateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - sandbox is not running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sandbox/{sandboxID}/mounts:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: addSandboxMount
      summary: Add an object storage mount
      description: |
        Attach a new object storage mount to a running sandbox. Credentials remain on
        the runner and are not exposed inside the sandbox.
      tags: [Sandbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MountRequest"
      responses:
        "201":
          description: Mount added successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mount"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - sandbox mount limit reached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sandbox/{sandboxID}/mounts/{mountID}:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/mountID"
    patch:
      operationId: updateSandboxMount
      summary: Update an object storage mount
      description: |
        Update an existing object storage mount on a running sandbox. Changing
        `bucket`, `mount_path`, or `read_only` causes the mount to be remounted.
        Setting `prefix`, `access_key_id`, or `secret_access_key` to an empty string
        clears that value.
      tags: [Sandbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MountUpdateRequest"
      responses:
        "200":
          description: Mount updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mount"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - updated mount configuration is not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSandboxMount
      summary: Delete an object storage mount
      description: Detach an existing object storage mount from a running sandbox.
      tags: [Sandbox]
      responses:
        "204":
          description: Mount deleted successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/presigned-url:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: createPresignedURL
      summary: Create a presigned URL
      description: |
        Create a temporary public URL for a specific sandbox port. The returned `token`
        is only returned once and is stored server-side as a SHA-256 hash.

        The URL resolves to `https://<token>.leap0.app` in production, or the matching
        environment-specific presigned domain in non-production stacks.
      tags: [Presigned URL]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignedURLCreateRequest"
      responses:
        "201":
          description: Presigned URL created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignedURLResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/presigned-url/{id}:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - $ref: "#/components/parameters/presignedURLID"
    delete:
      operationId: deletePresignedURL
      summary: Delete a presigned URL
      description: Revoke a previously issued presigned URL for a sandbox.
      tags: [Presigned URL]
      responses:
        "204":
          description: Presigned URL deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/system/user-home-dir:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    get:
      operationId: getSandboxUserHomeDir
      summary: Get sandbox user home directory
      description: Returns the resolved home directory for the sandbox user.
      tags: [Sandbox]
      responses:
        "200":
          description: Sandbox user home directory retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxUserHomeDirResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/system/workdir:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    get:
      operationId: getSandboxWorkdir
      summary: Get sandbox workdir
      description: Returns the configured working directory used for the sandbox init command.
      tags: [Sandbox]
      responses:
        "200":
          description: Sandbox workdir retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxWorkdirResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/snapshot/create:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: createSnapshot
      summary: Create a snapshot
      description: |
        Create a snapshot from a running sandbox. The snapshot captures the sandbox's
        memory image, VM state, writable disk diff, and resource configuration.
        The source sandbox resumes after the snapshot is stored.
      tags: [Snapshot]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotCreateRequest"
      responses:
        "201":
          description: Snapshot created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - snapshot name already exists or is being created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sandbox/{sandboxID}/snapshot/pause:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: pauseSnapshot
      summary: Snapshot and terminate a sandbox
      description: |
        Create a named snapshot from a running sandbox, then terminate the source
        sandbox after the snapshot is stored. The snapshot can later be restored
        via the resume endpoint.
      tags: [Snapshot]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotCreateRequest"
      responses:
        "201":
          description: Snapshot created and sandbox terminated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotPauseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - sandbox is not running, or the snapshot name already exists or is being created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/snapshot/resume:
    post:
      operationId: resumeSnapshot
      summary: Restore a snapshot
      description: |
        Create a new sandbox from a previously saved snapshot. The restored sandbox
        reuses the snapshot's template, CPU, memory, and disk settings. `timeout`
        auto-pause behavior and network policy can be overridden at restore time.
      tags: [Sandbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotResumeRequest"
      responses:
        "201":
          description: Sandbox restored from snapshot successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: Too many requests - organization sandbox limit reached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service unavailable - no runner capacity available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/snapshot/{snapshotID}:
    parameters:
      - $ref: "#/components/parameters/snapshotID"
    delete:
      operationId: deleteSnapshot
      summary: Delete a snapshot
      description: |
        Delete a stored snapshot and its artifacts. Deletion fails if the snapshot is
        still referenced by an active sandbox.
      tags: [Snapshot]
      responses:
        "204":
          description: Snapshot deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - snapshot is in use by an active sandbox.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sandboxes:
    get:
      operationId: listSandboxes
      summary: List sandboxes
      description: |
        List sandboxes for the authenticated organization. Results can be filtered by
        state and sorted by creation time or current state.
      tags: [Sandbox]
      parameters:
        - name: state
          in: query
          required: false
          description: Filter results by sandbox state.
          schema:
            type: string
            enum: [starting, snapshotting, running, paused, unpausing, deleting]
        - name: sort
          in: query
          required: false
          description: Field used to sort results.
          schema:
            type: string
            enum: [created_at, state]
            default: created_at
        - name: order-by
          in: query
          required: false
          description: Sort direction.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          required: false
          description: 1-based results page.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page-size
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated sandbox summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSandboxesResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/snapshots:
    get:
      operationId: listSnapshots
      summary: List snapshots
      description: |
        List snapshots for the authenticated organization. Results can be filtered by
        snapshot name and sorted by creation time or template ID.
      tags: [Snapshot]
      parameters:
        - name: query
          in: query
          required: false
          description: Filter results by snapshot name.
          schema:
            type: string
            maxLength: 64
        - name: sort
          in: query
          required: false
          description: Field used to sort results.
          schema:
            type: string
            enum: [created_at, template_id]
            default: created_at
        - name: order-by
          in: query
          required: false
          description: Sort direction.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          required: false
          description: 1-based results page.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page-size
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated snapshot summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSnapshotsResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # Template
  # ──────────────────────────────────────────────
  /v1/template:
    post:
      operationId: uploadTemplate
      summary: Upload a template
      description: |
        Upload a container image as a template. The image is pulled, converted to a rootfs,
        and stored for later use when creating sandboxes. A maximum of 25 templates per
        organization is enforced.
      tags: [Template]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadTemplateRequest"
      responses:
        "201":
          description: Template uploaded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadTemplateResponse"
        "400":
          description: Validation error or invalid image.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Conflict – template name already exists or template limit reached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/template/{templateID}:
    parameters:
      - name: templateID
        in: path
        required: true
        description: Unique template identifier.
        schema:
          type: string
    patch:
      operationId: renameTemplate
      summary: Rename a template
      tags: [Template]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameTemplateRequest"
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - template cannot be renamed or the name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTemplate
      summary: Delete a template
      tags: [Template]
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - template cannot be deleted or is still in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ──────────────────────────────────────────────
  # Filesystem
  # ──────────────────────────────────────────────
  /v1/sandbox/{sandboxID}/filesystem/ls:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: filesystemLS
      summary: List directory contents
      description: List files and directories at the given path inside the sandbox.
      tags: [Filesystem]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LSRequest"
      responses:
        "200":
          description: Directory listing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LSResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/filesystem/stat:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: filesystemStat
      summary: Get file or directory info
      description: Returns metadata about a file or directory at the given path.
      tags: [Filesystem]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatRequest"
      responses:
        "200":
          description: File info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/filesystem/mkdir:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: filesystemMkdir
      summary: Create a directory
      description: Create a directory at the given path. Optionally create parent directories recursively.
      tags: [Filesystem]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MkdirRequest"
      responses:
        "204":
          description: Directory created.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/filesystem/write-file:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: Absolute file path inside the sandbox.
      - name: permissions
        in: query
        required: false
        schema:
          type: string
        description: Optional octal file mode (e.g. "0755").
    post:
      operationId: filesystemWriteFile
      summary: Write a file
      description: Write a single file to the sandbox. The raw file bytes are sent as the request body.
      tags: [Filesystem]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: File written.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/filesystem/write-files:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: filesystemWriteFiles
      summary: Write multiple files
      description: Write multiple files in a single request. Send as multipart/form-data where each part's name is the file path and body is the raw file bytes.
      tags: [Filesystem]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties:
                type: string
                format: binary
      responses:
        "204":
          description: Files written.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/sandbox/{sandboxID}/filesystem/read-file:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: filesystemReadFile
      summary: Read a file
      description: Read a file from the sandbox. Returns the raw file bytes in the response body.
      tags: [Filesystem]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadFileRequest"
      responses:
        "200":
          description: Raw file content.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sandbox/{sandboxID}/filesystem/read-files:
    parameters:
      - $ref: "#/components/parameters/sandboxID"
    post:
      operationId: filesystemReadFiles
      summary: Read multiple files
      description: Read multiple files. Returns multipart/form-data where each part's name is the file path and body is the raw file bytes.
      tags: [Filesystem]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadFilesRequest"
      responses:
        "200":
          description: Multipart response with each file as a part.
          content:
            multipart/form-data:
              schema:
                type: object
                additionalProperties:
                  type: string
                  format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

